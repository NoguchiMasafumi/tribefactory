<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ローカルMP4軽量化ツール（完全ブラウザ標準版）</title>
  <style>
    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      max-width: 600px;
      margin: 40px auto;
      padding: 20px;
      background-color: #f5f7fa;
      color: #333;
    }
    .container {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    h1 {
      font-size: 24px;
      margin-bottom: 20px;
      text-align: center;
      color: #2c3e50;
    }
    .input-group {
      margin-bottom: 20px;
    }
    input[type="file"] {
      display: block;
      width: 100%;
      padding: 10px;
      border: 2px dashed #bdc3c7;
      border-radius: 6px;
      cursor: pointer;
    }
    button {
      display: block;
      width: 100%;
      padding: 12px;
      background-color: #3498db;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover {
      background-color: #2980b9;
    }
    button:disabled {
      background-color: #bdc3c7;
      cursor: not-allowed;
    }
    #status {
      margin-top: 20px;
      padding: 10px;
      border-radius: 6px;
      background-color: #ecf0f1;
      font-size: 14px;
      white-space: pre-line;
    }
    .result-video {
      margin-top: 20px;
      width: 100%;
      border-radius: 6px;
      display: none;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>MP4軽量化（外部接続なし版）</h1>
  
  <div class="input-group">
    <label for="video-input">動画ファイルを選択 (MP4):</label>
    <input type="file" id="video-input" accept="video/mp4">
  </div>

  <button id="compress-btn">軽量化を開始</button>

  <div id="status">準備完了。動画を選択してボタンを押してください。</div>

  <video id="output-video" class="result-video" controls></video>
</div>

<script>
  const inputElement = document.getElementById('video-input');
  const button = document.getElementById('compress-btn');
  const statusDiv = document.getElementById('status');
  const outputVideo = document.getElementById('output-video');

  button.addEventListener('click', async () => {
    const file = inputElement.files[0];
    if (!file) {
      alert('動画ファイルを選択してください。');
      return;
    }

    button.disabled = true;
    button.textContent = '処理中...';
    statusDiv.textContent = '動画を読み込み中...';

    // 1. ビデオ要素を作成して動画を読み込む
    const video = document.createElement('video');
    video.src = URL.createObjectURL(file);
    video.muted = true;
    video.playsInline = true;

    await new Promise((resolve) => {
      video.onloadeddata = resolve;
    });

    // 2. キャンバスの設定（ここで解像度を下げて軽量化する：例 1280x720）
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 1280;
    canvas.height = 720;

    // 3. 画面の録画機能（MediaRecorder）を準備
    const stream = canvas.captureStream(30); // 30fps
    
    // ブラウザが対応しているエンコード形式を選択
    let options = { mimeType: 'video/webm; codecs=vp9' };
    if (MediaRecorder.isTypeSupported('video/mp4;codecs=avc1.42E01E')) {
      options = { mimeType: 'video/mp4;codecs=avc1.42E01E' };
    }

    const mediaRecorder = new MediaRecorder(stream, options);
    const chunks = [];

    mediaRecorder.ondataavailable = (e) => {
      if (e.data.size > 0) chunks.push(e.data);
    };

    mediaRecorder.onstop = () => {
      const blob = new Blob(chunks, { type: options.mimeType });
      const videoUrl = URL.createObjectURL(blob);
      outputVideo.src = videoUrl;
      outputVideo.style.display = 'block';
      statusDiv.textContent = `軽量化が完了しました！\n（形式: ${options.mimeType}）\nプレイヤーの下部メニュー、または右クリックから保存できます。`;
      button.disabled = false;
      button.textContent = '軽量化を開始';
    };

    // 4. 再生しながらキャンバスに描画（高速で処理）
    statusDiv.textContent = '動画を再エンコード中...（実時間かかります）';
    mediaRecorder.start();
    video.play();

    function drawFrame() {
      if (video.ended || video.paused) {
        mediaRecorder.stop();
        return;
      }
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      requestAnimationFrame(drawFrame);
    }
    
    drawFrame();
  });
</script>

</body>
</html>
