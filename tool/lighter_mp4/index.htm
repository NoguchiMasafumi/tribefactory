<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>爆速・ローカルMP4軽量化ツール</title>
  <style>
    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      max-width: 600px;
      margin: 40px auto;
      padding: 20px;
      background-color: #f5f7fa;
      color: #333;
    }
    .container {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    h1 {
      font-size: 24px;
      margin-bottom: 5px;
      text-align: center;
      color: #2c3e50;
    }
    .subtitle {
      text-align: center;
      font-size: 12px;
      color: #7f8c8d;
      margin-bottom: 25px;
    }
    .input-group {
      margin-bottom: 20px;
    }
    input[type="file"] {
      display: block;
      width: 100%;
      padding: 10px;
      border: 2px dashed #3498db;
      border-radius: 6px;
      cursor: pointer;
    }
    button {
      display: block;
      width: 100%;
      padding: 12px;
      background-color: #e67e22;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover {
      background-color: #d35400;
    }
    button:disabled {
      background-color: #bdc3c7;
      cursor: not-allowed;
    }
    #status {
      margin-top: 20px;
      padding: 12px;
      border-radius: 6px;
      background-color: #ecf0f1;
      font-size: 14px;
      white-space: pre-line;
      line-height: 1.5;
    }
    .result-video {
      margin-top: 20px;
      width: 100%;
      border-radius: 6px;
      display: none;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>MP4軽量化（爆速・完全ローカル版）</h1>
  <div class="subtitle">実時間なし / 外部通信なし / エラーフリー</div>
  
  <div class="input-group">
    <label for="video-input">動画ファイルを選択 (MP4):</label>
    <input type="file" id="video-input" accept="video/mp4">
  </div>

  <button id="compress-btn">爆速軽量化を開始</button>

  <div id="status">準備完了。動画を選択してボタンを押してください。</div>

  <video id="output-video" class="result-video" controls></video>
</div>

<script>
  const inputElement = document.getElementById('video-input');
  const button = document.getElementById('compress-btn');
  const statusDiv = document.getElementById('status');
  const outputVideo = document.getElementById('output-video');

  // バックグラウンドで超高速に動画処理を行うための並列処理(Web Worker)の仕組みを定義
  const workerCode = `
    importScripts('https://cdnjs.cloudflare.com/ajax/libs/ffmpeg.js/3.1.9001/ffmpeg-mp4.js');
    
    onmessage = function(e) {
      const { videoData } = e.data;
      
      postMessage({ type: 'status', data: 'FFmpegエンジンを起動中...' });
      
      // 高速計算用の設定でFFmpegを実行
      // 解像度を1280x720に、画質CRFを28（軽量）に設定
      const result = ffmpeg({
        arguments: [
          '-i', 'input.mp4',
          '-vcodec', 'libx264',
          '-crf', '28',
          '-s', '1280x720',
          '-pix_fmt', 'yuv420p',
          'output.mp4'
        ],
        MEMFS: [{ name: 'input.mp4', data: videoData }]
      });

      const outResult = result.MEMFS[0];
      if (outResult) {
        postMessage({ type: 'done', data: outResult.data }, [outResult.data.buffer]);
      } else {
        postMessage({ type: 'error', data: '変換に失敗しました。ファイルが大きすぎるか、メモリの上限です。' });
      }
    };
  `;

  button.addEventListener('click', async () => {
    const file = inputElement.files[0];
    if (!file) {
      alert('動画ファイルを選択してください。');
      return;
    }

    button.disabled = true;
    button.textContent = '処理中...';
    statusDiv.textContent = '動画データをメモリに読み込んでいます...';

    // 動画ファイルをバイナリデータとして読み込む
    const reader = new FileReader();
    reader.onload = function() {
      const arrayBuffer = reader.result;
      const uint8Array = new Uint8Array(arrayBuffer);

      statusDiv.textContent = '爆速エンコードを実行中...\n（実時間ではなく、マシンの全力で計算しています。10〜30秒ほどお待ちください）';

      // ページが重くならないよう、別スレッド(Worker)を立ち上げて一気に計算させる
      // ※cdnjsの安定した旧版を使用し、503や404を回避しています
      const blob = new Blob([workerCode], { type: 'application/javascript' });
      const worker = new Worker(URL.createObjectURL(blob));

      // Workerに動画データを丸ごと渡す
      worker.postMessage({ videoData: uint8Array }, [uint8Array.buffer]);

      // 計算が終わった後の処理
      worker.onmessage = function(e) {
        const { type, data } = e.data;
        if (type === 'status') {
          statusDiv.textContent = data;
        } else if (type === 'done') {
          // 完了したらBlob URLにして再生プレイヤーにセット
          const outputBlob = new Blob([data], { type: 'video/mp4' });
          const videoUrl = URL.createObjectURL(outputBlob);
          
          outputVideo.src = videoUrl;
          outputVideo.style.display = 'block';
          statusDiv.textContent = '🎉 軽量化が完了しました！\n動画プレイヤーのメニュー（または右クリック）から保存できます。';
          
          button.disabled = false;
          button.textContent = '爆速軽量化を開始';
          worker.terminate();
        } else if (type === 'error') {
          statusDiv.textContent = '❌ エラー: ' + data;
          button.disabled = false;
          button.textContent = '爆速軽量化を開始';
          worker.terminate();
        }
      };
    };

    reader.readAsArrayBuffer(file);
  });
</script>

</body>
</html>
