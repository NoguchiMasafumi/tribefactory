<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>井の頭線路線図</title>
</head>
<body style="margin:0;padding:20px;background:#ffffff;">
    <div id="loadingStatus" style="margin-bottom:10px; font-weight:bold; color:#555;">データを読み込み中...</div>
    <canvas id="inokashiraCanvas" width="950" height="350"></canvas>
    <script>
        const canvas = document.getElementById('inokashiraCanvas');
        const ctx = canvas.getContext('2d');
        const loadingStatus = document.getElementById('loadingStatus');

        const jsonUrl = '/test_place/train/n02-22_railroadsection.json';

        async function drawInokashiraLine() {
            try {
                const response = await fetch(jsonUrl);
                if (!response.ok) {
                    throw new Error(`HTTPエラー! ステータス: ${response.status}`);
                }
                const data = await response.json();
                
                loadingStatus.textContent = "データを解析中...";

                const order = [
                    "渋谷", "神泉", "駒場東大前", "池ノ上", "下北沢", 
                    "新代田", "東松原", "明大前", "永福町", "西永福", 
                    "浜田山", "高井戸", "富士見ヶ丘", "久我山", "三鷹台", 
                    "井の頭公園", "吉祥寺"
                ];

                const stationMap = {};
                
                if (data && data.features) {
                    data.features.forEach(f => {
                        if (!f.properties) return;

                        // 1. 判定を「京王」か「井の頭」が含まれているか、または該当の駅名があるかで緩くチェック
                        const lineName = f.properties.N02_003 || "";
                        const companyName = f.properties.N02_004 || "";
                        const stationName = f.properties.N02_005 || "";

                        const isInokashira = lineName.includes("井の頭") || 
                                             lineName.includes("１号線") || 
                                             companyName.includes("京王");

                        if (isInokashira && stationName) {
                            // 対象の駅名リストに含まれているか確認
                            const matchedName = order.find(name => stationName.includes(name));
                            
                            if (matchedName && f.geometry && f.geometry.coordinates) {
                                // 座標を取得（LineStringの場合は最初のポイント、Pointの場合はそのまま）
                                let coords = f.geometry.coordinates;
                                if (f.geometry.type === "LineString") {
                                    coords = coords[0];
                                } else if (f.geometry.type === "MultiLineString") {
                                    coords = coords[0][0];
                                }
                                stationMap[matchedName] = coords;
                            }
                        }
                    });
                }

                // もし判定で全滅していた場合、最終手段として路線名に関わらず駅名だけでマッチングをかけるロジック
                if (Object.keys(stationMap).length === 0 && data.features) {
                    data.features.forEach(f => {
                        if (!f.properties || !f.properties.N02_005) return;
                        const stationName = f.properties.N02_005;
                        const matchedName = order.find(name => stationName === name);
                        if (matchedName && f.geometry && f.geometry.coordinates) {
                            let coords = f.geometry.coordinates;
                            if (f.geometry.type === "LineString") coords = coords[0];
                            stationMap[matchedName] = coords;
                        }
                    });
                }

                const stations = [];
                order.forEach((name, index) => {
                    if (stationMap[name]) {
                        let x = 60 + (index * 50);
                        let y = 150;
                        if (index > 8) {
                            x = 60 + ((index - 9) * 100);
                            y = 250;
                        }
                        stations.push({ name: name, x: x, y: y });
                    }
                });

                if (stations.length === 0) {
                    loadingStatus.textContent = "エラー：データ内に該当する駅名（渋谷〜吉祥寺）の座標を1つも特定できませんでした。";
                    return;
                }

                loadingStatus.style.display = 'none';
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                // 線の描画
                ctx.lineWidth = 8;
                ctx.strokeStyle = '#3bb2e5';
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';

                ctx.beginPath();
                ctx.moveTo(stations[0].x, stations[0].y);
                for (let i = 1; i < stations.length; i++) {
                    ctx.lineTo(stations[i].x, stations[i].y);
                }
                ctx.stroke();

                // 駅の描画
                stations.forEach((st) => {
                    ctx.beginPath();
                    ctx.arc(st.x, st.y, 6, 0, Math.PI * 2);
                    ctx.fillStyle = '#ffffff';
                    ctx.fill();
                    ctx.lineWidth = 3;
                    ctx.strokeStyle = '#3bb2e5';
                    ctx.stroke();

                    ctx.fillStyle = '#000000';
                    ctx.font = 'bold 11px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText(st.name, st.x, st.y - 15);
                });

            } catch (err) {
                loadingStatus.textContent = "エラーが発生しました: " + err.message;
                console.error(err);
            }
        }

        drawInokashiraLine();
    </script>
</body>
</html>
