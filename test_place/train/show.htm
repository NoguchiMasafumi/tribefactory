<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>井の頭線路線図</title>
</head>
<body style="margin:0;padding:20px;background:#ffffff;">
    <canvas id="inokashiraCanvas" width="900" height="300"></canvas>
    <script>
        const canvas = document.getElementById('inokashiraCanvas');
        const ctx = canvas.getContext('2d');

        fetch('./N02-22_Station.geojson')
            .then(response => response.json())
            .then(data => {
                const order = [
                    "渋谷", "神泉", "駒場東大前", "池ノ上", "下北沢", 
                    "新代田", "東松原", "明大前", "永福町", "西永福", 
                    "浜田山", "高井戸", "富士見ヶ丘", "久我山", "三鷹台", 
                    "井の頭公園", "吉祥寺"
                ];

                const stationMap = {};
                data.features.forEach(f => {
                    if (f.properties.N02_003 === "井の頭線") {
                        const name = f.properties.N02_005;
                        const coords = f.geometry.coordinates[0];
                        if (order.includes(name)) {
                            stationMap[name] = coords;
                        }
                    }
                });

                const stations = [];
                order.forEach((name, index) => {
                    if (stationMap[name]) {
                        let x = 50 + (index * 50);
                        let y = 150;
                        if (index > 8) {
                            x = 50 + ((index - 9) * 100);
                            y = 250;
                        }
                        stations.push({ name: name, x: x, y: y });
                    }
                });

                ctx.lineWidth = 8;
                ctx.strokeStyle = '#3bb2e5';
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';

                ctx.beginPath();
                ctx.moveTo(stations[0].x, stations[0].y);
                for (let i = 1; i <= 8; i++) {
                    ctx.lineTo(stations[i].x, stations[i].y);
                }
                ctx.lineTo(stations[8].x + 50, stations[8].y);
                ctx.lineTo(stations[9].x - 50, stations[9].y);
                for (let i = 9; i < stations.length; i++) {
                    ctx.lineTo(stations[i].x, stations[i].y);
                }
                ctx.stroke();

                stations.forEach((st) => {
                    ctx.beginPath();
                    ctx.arc(st.x, st.y, 6, 0, Math.PI * 2);
                    ctx.fillStyle = '#ffffff';
                    ctx.fill();
                    ctx.lineWidth = 3;
                    ctx.strokeStyle = '#3bb2e5';
                    ctx.stroke();

                    ctx.fillStyle = '#000000';
                    ctx.font = 'bold 12px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText(st.name, st.x, st.y - 15);
                });
            });
    </script>
</body>
</html>
