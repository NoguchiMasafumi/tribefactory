<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>エリア連動型・全路線自動描画システム</title>
</head>
<body style="margin:0;padding:20px;background:#ffffff;">
    <div style="margin-bottom:15px; font-family:sans-serif;">
        <label for="areaSelect" style="font-weight:bold; margin-right:5px;">① エリア選択:</label>
        <select id="areaSelect" onchange="onAreaSelected()" style="padding:5px; font-size:14px; margin-right:15px;">
            <option value="">-- エリアを選択 --</option>
            <option value="北海道・東北">北海道・東北</option>
            <option value="関東">関東</option>
            <option value="中部">中部</option>
            <option value="近畿">近畿</option>
            <option value="中国・四国">中国・四国</option>
            <option value="九州・沖縄">九州・沖縄</option>
        </select>

        <label for="lineSelect" style="font-weight:bold; margin-right:5px;">② 路線選択:</label>
        <select id="lineSelect" onchange="onLineSelected()" style="padding:5px; font-size:14px; max-width:400px;" disabled>
            <option value="">-- 先にエリアを選択してください --</option>
        </select>
    </div>
    <div id="loadingStatus" style="margin-bottom:10px; font-weight:bold; color:#555;">データを読み込み中...</div>
    <canvas id="inokashiraCanvas" width="1400" height="800" style="border:1px solid #eee;"></canvas>
    <script>
        const canvas = document.getElementById('inokashiraCanvas');
        const ctx = canvas.getContext('2d');
        const loadingStatus = document.getElementById('loadingStatus');
        const areaSelect = document.getElementById('areaSelect');
        const lineSelect = document.getElementById('lineSelect');

        const jsonUrl = '/test_place/train/n02-22_station.json';
        
        let globalGeoData = null;
        let lineGroups = {};
        let areaMapping = {
            "北海道・東北": [],
            "関東": [],
            "中部": [],
            "近畿": [],
            "中国・四国": [],
            "九州・沖縄": []
        };

        function getAreaFromCompanyAndCoords(company, lng, lat) {
            const comp = company || "";
            if (comp.includes("北海道") || comp.includes("東日本") && lat >= 37.0 || comp.includes("仙台") || comp.includes("青い森") || comp.includes("三陸") || comp.includes("秋田") || comp.includes("岩手") || comp.includes("山形") || comp.includes("福島")) return "北海道・東北";
            if (comp.includes("東京") || comp.includes("京王") || comp.includes("小田急") || comp.includes("東急") || comp.includes("京急") || comp.includes("西武") || comp.includes("東武") || comp.includes("京成") || comp.includes("相模") || comp.includes("横浜") || comp.includes("都営") || comp.includes("千葉") || comp.includes("埼玉") || comp.includes("神奈川") || comp.includes("つくば")) return "関東";
            if (comp.includes("東海") || comp.includes("名古屋") || comp.includes("名鉄") || comp.includes("北陸") && lng >= 136.0 || comp.includes("新潟") || comp.includes("長野") || comp.includes("静岡") || comp.includes("富山") || comp.includes("石川") || comp.includes("福井") || comp.includes("山梨") || comp.includes("岐阜") || comp.includes("愛知")) return "中部";
            if (comp.includes("西日本") && lng < 136.5 && lng >= 134.3 || comp.includes("阪急") || comp.includes("阪神") || comp.includes("近畿") || comp.includes("近鉄") || comp.includes("南海") || comp.includes("京阪") || comp.includes("大阪") || comp.includes("京都") || comp.includes("神戸") || comp.includes("奈良") || comp.includes("和歌山") || comp.includes("滋賀")) return "近畿";
            if (comp.includes("四国") || comp.includes("広島") || comp.includes("岡山") || comp.includes("鳥取") || comp.includes("島根") || comp.includes("山口") || comp.includes("徳島") || comp.includes("香川") || comp.includes("愛媛") || comp.includes("高知") || comp.includes("一畑") || comp.includes("スカイレール")) return "中国・四国";
            if (comp.includes("九州") || comp.includes("福岡") || comp.includes("佐賀") || comp.includes("長崎") || comp.includes("熊本") || comp.includes("大分") || comp.includes("宮崎") || comp.includes("鹿児島") || comp.includes("沖縄") || comp.includes("西日本鉄道")) return "九州・沖縄";
            
            if (lat >= 36.8) return "北海道・東北";
            if (lat >= 34.5 && lat < 36.8 && lng >= 138.3) return "関東";
            if (lat >= 34.2 && lat < 36.8 && lng >= 136.2 && lng < 138.3) return "中部";
            if (lat >= 33.4 && lat < 36.0 && lng >= 134.3 && lng < 136.2) return "近畿";
            if (lat >= 32.0 && lat < 36.5 && lng >= 130.8 && lng < 134.3) return "中国・四国";
            return "九州・沖縄";
        }

        async function initSystem() {
            try {
                loadingStatus.textContent = "13.6MBのデータを読み込み中...";
                const response = await fetch(jsonUrl);
                if (!response.ok) {
                    throw new Error(`HTTPエラー! ステータス: ${response.status}`);
                }
                globalGeoData = await response.json();
                
                loadingStatus.textContent = "全路線・全駅を解析してエリア分類中...";
                
                if (globalGeoData && globalGeoData.features) {
                    globalGeoData.features.forEach(f => {
                        if (!f.properties || !f.geometry || !f.geometry.coordinates) return;

                        const companyName = f.properties.N02_004 || "不明な事業者";
                        const lineName = f.properties.N02_003 || "不明な路線";
                        const stationName = f.properties.N02_005 || "";
                        
                        if (!stationName) return;

                        const groupKey = `${companyName} - ${lineName}`;
                        
                        if (!lineGroups[groupKey]) {
                            lineGroups[groupKey] = [];
                        }
                        
                        const isExist = lineGroups[groupKey].some(st => st.name === stationName);
                        if (!isExist) {
                            lineGroups[groupKey].push({
                                name: stationName,
                                coords: f.geometry.coordinates,
                                company: companyName
                            });
                        }
                    });
                }

                Object.keys(lineGroups).forEach(key => {
                    const stations = lineGroups[key];
                    if (stations.length === 0) return;
                    
                    let sumLng = 0, sumLat = 0;
                    stations.forEach(st => {
                        sumLng += st.coords[0];
                        sumLat += st.coords[1];
                    });
                    const avgLng = sumLng / stations.length;
                    const avgLat = sumLat / stations.length;
                    
                    const area = getAreaFromCompanyAndCoords(stations[0].company, avgLng, avgLat);
                    if (areaMapping[area]) {
                        areaMapping[area].push(key);
                    }
                });

                Object.keys(areaMapping).forEach(area => {
                    areaMapping[area] = [...new Set(areaMapping[area])].sort();
                });

                loadingStatus.textContent = "データの読み込みが完了しました。エリアを選択してください。";

            } catch (err) {
                loadingStatus.textContent = "初期化エラー: " + err.message;
                console.error(err);
            }
        }

        function onAreaSelected() {
            const selectedArea = areaSelect.value;
            lineSelect.innerHTML = '';
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (!selectedArea) {
                lineSelect.innerHTML = '<option value="">-- 先にエリアを選択してください --</option>';
                lineSelect.disabled = true;
                return;
            }

            lineSelect.disabled = false;
            lineSelect.innerHTML = '<option value="">-- 路線を選択してください --</option>';
            
            const lines = areaMapping[selectedArea];
            lines.forEach(key => {
                const option = document.createElement('option');
                option.value = key;
                option.textContent = key;
                lineSelect.appendChild(option);
            });
        }

        function drawSelectedLine(groupKey) {
            if (!groupKey || !lineGroups[groupKey]) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                return;
            }

            loadingStatus.style.display = 'block';
            loadingStatus.textContent = "路線図を自動生成中...";

            const rawStations = lineGroups[groupKey];
            if (rawStations.length === 0) return;

            let pool = [...rawStations];
            let sortedStations = [];

            let startNode = pool[0];
            let maxDist = -1;
            for (let i = 0; i < pool.length; i++) {
                for (let j = i + 1; j < pool.length; j++) {
                    let dx = pool[i].coords[0] - pool[j].coords[0];
                    let dy = pool[i].coords[1] - pool[j].coords[1];
                    let d = dx * dx + dy * dy;
                    if (d > maxDist) {
                        maxDist = d;
                        startNode = pool[i];
                    }
                }
            }

            sortedStations.push(startNode);
            pool = pool.filter(st => st.name !== startNode.name);

            while (pool.length > 0) {
                let current = sortedStations[sortedStations.length - 1];
                let closestIndex = -1;
                let minDist = Infinity;

                for (let i = 0; i < pool.length; i++) {
                    let dx = pool[i].coords[0] - current.coords[0];
                    let dy = pool[i].coords[1] - current.coords[1];
                    let d = dx * dx + dy * dy;
                    if (d < minDist) {
                        minDist = d;
                        closestIndex = i;
                    }
                }

                if (closestIndex !== -1) {
                    sortedStations.push(pool[closestIndex]);
                    pool.splice(closestIndex, 1);
                } else {
                    break;
                }
            }

            if (sortedStations[0].coords[0] > sortedStations[sortedStations.length - 1].coords[0]) {
                sortedStations.reverse();
            }

            const perRow = 10;
            const mappedStations = [];

            sortedStations.forEach((st, index) => {
                const row = Math.floor(index / perRow);
                const col = index % perRow;
                
                const x = 80 + (col * 120);
                const y = 100 + (row * 150);
                
                mappedStations.push({ name: st.name, x: x, y: y });
            });

            loadingStatus.style.display = 'none';
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.lineWidth = 8;
            ctx.strokeStyle = '#3bb2e5';
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            ctx.beginPath();
            ctx.moveTo(mappedStations[0].x, mappedStations[0].y);
            for (let i = 1; i < mappedStations.length; i++) {
                ctx.lineTo(mappedStations[i].x, mappedStations[i].y);
            }
            ctx.stroke();

            mappedStations.forEach((st, index) => {
                ctx.beginPath();
                ctx.arc(st.x, st.y, 6, 0, Math.PI * 2);
                ctx.fillStyle = '#ffffff';
                ctx.fill();
                ctx.lineWidth = 3;
                ctx.strokeStyle = '#3bb2e5';
                ctx.stroke();

                ctx.fillStyle = '#000000';
                ctx.font = 'bold 11px sans-serif';
                ctx.textAlign = 'center';
                
                if (index % 2 === 0) {
                    ctx.fillText(st.name, st.x, st.y - 15);
                } else {
                    ctx.fillText(st.name, st.x, st.y + 25);
                }
            });
        }

        function onLineSelected() {
            const selectedKey = lineSelect.value;
            drawSelectedLine(selectedKey);
        }

        initSystem();
    </script>
</body>
</html>
